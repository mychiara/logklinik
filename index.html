<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Logbook Klinik | Sistem Monitoring Praktik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f8fafc; margin: 0">
    <div id="toast-container"></div>
    <div id="loader" class="hidden">
        <div style="display: flex; flex-direction: column; align-items: center">
            <div class="spinner-wrapper"><div class="spinner-ring"></div><div class="spinner-ring"></div><div class="spinner-ring"></div><div class="spinner-ring"></div></div>
            <div style="margin-top: 20px; color: var(--primary-dark); font-weight: 600; font-size: 1.1rem; letter-spacing: 1px;">Mohon menunggu...</div>
        </div>
    </div>

    <div id="pwa-gatekeeper" class="hidden">
        <div class="gatekeeper-card animate-fade-up">
            <div class="gatekeeper-icon"><i class="fa-solid fa-mobile-screen-button"></i><i class="fa-solid fa-arrow-down install-arrow"></i></div>
            <h2>Aplikasi Khusus Mobile!</h2>
            <p>E-Klinik dirancang sebagai aplikasi fullscreen. Anda wajib menginstal web ini ke layar HP.</p>
            <button id="btn-install-pwa" class="btn btn-primary" style="width: 100%; border-radius: 50px; font-weight: 700; height: 50px;">Install App Sekarang</button>
        </div>
    </div>

    <section id="login-section" class="login-wrapper">
        <div class="login-container">
            <div class="login-branding">
                <div class="branding-content animate-fade-up">
                    <div class="brand-icon"><i class="fa-solid fa-notes-medical"></i></div>
                    <h1>E-Logbook<br>Klinik</h1>
                    <p>Sistem cerdas monitoring praktik kesehatan.</p>
                </div>
                <div class="circle circle-1"></div><div class="circle circle-2"></div>
            </div>
            <div class="login-form-area">
                <div class="login-form-box animate-fade-in">
                    <div class="form-header"><h2>Selamat Datang</h2><p>Silakan masuk ke akun Anda</p></div>
                    <form id="login-form">
                        <div class="form-group"><label>User ID / NIM</label><input type="text" id="username" required placeholder="Masukkan ID" class="form-control"></div>
                        <div class="form-group"><label>Password</label><input type="password" id="password" required placeholder="********" class="form-control"></div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg">Masuk Sekolah</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <section id="dashboard-section" class="hidden">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="app-logo"><div class="icon-box"><i class="fa-solid fa-stethoscope"></i></div><h3>E-LogKlinik</h3></div>
                <button id="close-sidebar" class="mobile-only btn-icon-ghost"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="user-profile-widget">
                <div class="avatar"><img src="https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff&bold=true" id="user-avatar-img" alt="Avatar"></div>
                <div class="user-details"><h4 id="user-name-display">Nama User</h4><span class="badge badge-glow" id="user-role-display">Role</span></div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav"></nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="toggle-sidebar" class="mobile-only btn-icon-ghost"><i class="fa-solid fa-bars-staggered"></i></button>
                    <div class="topbar-breadcrumb">
                        <span class="text-muted"><i class="fa-solid fa-house fa-sm"></i> /</span>
                        <strong id="topbar-title-text" class="ml-1">Dashboard</strong>
                    </div>
                </div>
                <div class="topbar-right">
                    <button class="btn-icon-ghost" onclick="window.location.reload(true)"><i class="fa-solid fa-rotate"></i></button>
                    <button id="logout-btn" class="btn btn-danger-soft btn-sm"><i class="fa-solid fa-power-off"></i><span class="desktop-only ml-2">Keluar</span></button>
                </div>
            </header>
            <div class="content-scroll"><div class="content-area" id="content-area"></div></div>
        </main>
    </section>

    <div id="app-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content animate-zoom-in">
            <div class="modal-header"><h3 id="modal-title">Form TITLE</h3><button class="btn-icon-ghost close-modal"><i class="fa-solid fa-xmark"></i></button></div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-services.js?v=2.3"></script>
    <script src="js/app.js?v=3.4"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("./sw.js")
                    .then(reg => console.log("SW Registered!"))
                    .catch(err => console.error("SW Registration failing!", err));
            });
        }
    </script>
</body>
</html>
