<!DOCTYPE html>
<html lang="id" style="min-height: 140vh; background: #f8fafc;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Logbook Klinik | Sistem Monitoring Praktik</title>
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css?v=1.1">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="zoom: 0.75; background: #f8fafc; min-height: 133.3vh; margin: 0;">
    <!-- Notifications -->
    <div id="toast-container"></div>

    <!-- Loading Spinner -->
    <div id="loader" class="hidden">
        <div style="display: flex; flex-direction: column; align-items: center;">
            <div class="spinner-wrapper">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>
            <div style="margin-top: 20px; color: var(--primary-dark); font-weight: 600; font-size: 1.1rem; letter-spacing: 1px;">Mohon menunggu...</div>
        </div>
    </div>

    <!-- Login Section -->
    <section id="login-section" class="login-wrapper">
        <div class="login-container">
            <!-- Left Branding Pane -->
            <div class="login-branding">
                <div class="branding-content animate-fade-up">
                    <div class="brand-icon">
                        <i class="fa-solid fa-notes-medical"></i>
                    </div>
                    <h1>E-Logbook<br>Klinik</h1>
                    <p>Sistem cerdas monitoring kehadiran dan progres kompetensi praktik mahasiswa kesehatan. Akurat, responsif, dan terintegrasi.</p>
                </div>
                <!-- Abstract decorative circles -->
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
            </div>
            
            <!-- Right Form Pane -->
            <div class="login-form-area">
                <div class="login-form-box animate-fade-in">
                    <div class="form-header">
                        <h2>Selamat Datang</h2>
                        <p>Silakan masuk ke akun Anda</p>
                    </div>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="username">User ID / NIM</label>
                            <div class="input-with-icon">
                                <i class="fa-regular fa-user"></i>
                                <input type="text" id="username" required placeholder="Masukkan ID Anda">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <div class="input-with-icon">
                                <i class="fa-solid fa-lock"></i>
                                <input type="password" id="password" required placeholder="••••••••">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg mt-3">
                            Masuk Sekarang <i class="fa-solid fa-arrow-right ml-2 transition-icon"></i>
                        </button>
                    </form>
                    <div class="login-footer">
                        <span>Sistem Edukasi Terpadu &copy; 2024</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Dashboard Section -->
    <section id="dashboard-section" class="hidden">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="app-logo">
                    <div class="icon-box"><i class="fa-solid fa-stethoscope"></i></div>
                    <h3>E-LogKlinik</h3>
                </div>
                <button id="close-sidebar" class="mobile-only btn-icon-ghost"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="user-profile-widget">
                <div class="avatar">
                    <img src="https://ui-avatars.com/api/?name=User&background=8b5cf6&color=fff&bold=true" id="user-avatar-img" alt="Avatar">
                </div>
                <div class="user-details">
                    <h4 id="user-name-display">Nama User</h4>
                    <span class="badge badge-glow" id="user-role-display">Role</span>
                </div>
            </div>
            
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Nav items generated by JS based on role -->
            </nav>
            
            <div class="sidebar-footer">
                <button id="logout-btn" class="btn btn-danger-soft btn-block">
                    <i class="fa-solid fa-sign-out-alt"></i> Keluar Sesi
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="toggle-sidebar" class="mobile-only btn-icon-ghost"><i class="fa-solid fa-bars-staggered"></i></button>
                    <div class="topbar-breadcrumb">
                        <span class="text-muted"><i class="fa-solid fa-house fa-sm"></i> /</span>
                        <strong id="topbar-title-text" class="ml-1">Dashboard</strong>
                    </div>
                </div>
                <div class="topbar-right gap-3">
                    <div class="pulse-icon">
                        <button class="btn-icon-ghost" title="Notifikasi"><i class="fa-regular fa-bell"></i></button>
                        <span class="ping"></span>
                    </div>
                </div>
            </header>
            
            <div class="content-scroll">
                <div class="content-area" id="content-area">
                    <!-- Dynamic Content Loads Here -->
                </div>
            </div>
        </main>
    </section>

    <!-- Modal Form (Reusable) -->
    <div id="app-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content animate-zoom-in">
            <div class="modal-header">
                <h3 id="modal-title">Form TITLE</h3>
                <button class="btn-icon-ghost close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Form loads here -->
            </div>
        </div>
    </div>

    <!-- Hidden audio for QR success (Short Silent/Beep base64 to prevent 404) -->
    <audio id="beep-sound" src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA" preload="auto"></audio>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-services.js"></script>
    <script src="js/app.js?v=1.4"></script>
    <script>
        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered!'))
                    .catch(err => console.error('SW Registration failing!', err));
            });
        }
    </script>
</body>
</html>
